# Brussels traffic ingest (Python). Commits 12_end/data/traffic.db when it changes.

name: 12-ingest-python

on:
  schedule:
    # Daily 06:15 UTC (staggered from R ingest to reduce SQLite contention)
    - cron: "15 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ingest_python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: 12_end/requirements-ingest.txt

      - name: Install dependencies
        working-directory: 12_end
        run: pip install -r requirements-ingest.txt

      - name: Ingest Brussels traffic
        working-directory: 12_end
        run: python3 01_ingest_traffic.py

      - name: Commit and push traffic.db if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 12_end/data/traffic.db
          git diff --staged --quiet || (git commit -m "chore(12_end): update traffic.db (ingest python)" && git push)
