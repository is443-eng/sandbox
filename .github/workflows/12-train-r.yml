# Brussels model training (R). Commits 12_end/data/modelr.json + validationr.json when they change.

name: Model Training (R)

on:
  schedule:
    # Weekly Monday 07:45 UTC (staggered from Python train)
    - cron: "45 7 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train_r:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: 12_end
          cache-version: 1

      - name: Train Brussels model
        working-directory: 12_end
        run: Rscript 02_train_model.R

      - name: Upload xgboost-model artifact
        uses: actions/upload-artifact@v4
        with:
          name: xgboost-model
          path: |
            12_end/data/modelr.json
            12_end/data/validationr.json

      - name: Commit and push model artifacts if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 12_end/data/modelr.json 12_end/data/validationr.json
          git diff --staged --quiet || (git commit -m "chore(12_end): update modelr (train R)" && git push)
