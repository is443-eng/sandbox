# Brussels model training (Python). Commits 12_end/data/modelpy.json + validationpy.json when they change.

name: Model Training (Python)

on:
  schedule:
    # Weekly Monday 07:30 UTC (after daily ingest)
    - cron: "30 7 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train_python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: 12_end/requirements-train.txt

      - name: Install dependencies
        working-directory: 12_end
        run: pip install -r requirements-train.txt

      - name: Train Brussels model
        working-directory: 12_end
        run: python3 02_train_model.py

      - name: Upload xgboost-model artifact
        uses: actions/upload-artifact@v4
        with:
          name: xgboost-model
          path: |
            12_end/data/modelpy.json
            12_end/data/validationpy.json

      - name: Commit and push model artifacts if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 12_end/data/modelpy.json 12_end/data/validationpy.json
          git diff --staged --quiet || (git commit -m "chore(12_end): update modelpy (train python)" && git push)
