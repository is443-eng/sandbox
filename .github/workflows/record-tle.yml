# Record Arcturus TLE daily and commit history so the Streamlit app can detect burns.
# Add repo secret: N2YO_API_KEY (your N2YO API key).

name: Record TLE

on:
  schedule:
    # Run at 06:15 UTC every day (adjust cron as needed)
    - cron: '15 6 * * *'
  workflow_dispatch:  # "Run workflow" button in Actions tab

jobs:
  record:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv numpy sgp4

      - name: Fetch and record TLE
        env:
          N2YO_API_KEY: ${{ secrets.N2YO_API_KEY }}
        run: python 01_query_api/04_arcturus_track_ecef_metrics.py --record-only

      - name: Commit and push TLE history if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f 01_query_api/data/tle_history_56371.csv 2>/dev/null || true
          git diff --staged --quiet || (git commit -m "chore: update TLE history (record-tle)" && git push)
