# then use the Publisher sidebar: sign in to Connect Cloud and deploy.
#
# Secrets (OLLAMA_API_KEY, etc.) must be set in Connect Cloud for this content — not in this file.

"$schema" = "https://cdn.posit.co/publisher/schemas/posit-publishing-schema-v3.json"

product_type = "connect_cloud"
type = "python-fastapi"
entrypoint = "app:app"
title = "Disaster Situational Brief Agent"
description = "Bounded autonomous agent API (GET /health, POST /hooks/agent). Module 10 data management lab."

files = [
  "/app.py",
  "/requirements.txt",
  "agent_backend/**",
  "agentpy/**",
]

